# fly.toml app configuration file generated for firelever-copilot on 2026-07-08T19:38:17-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'firelever-copilot'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  KB_DB_PATH = '/data/kb.db'
  PORT = '8080'

[[mounts]]
  source = 'flv_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
