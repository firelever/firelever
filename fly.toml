# fly.toml app configuration file generated for firelever-copilot on 2026-07-08T19:38:17-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'firelever-copilot'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  KB_DB_PATH = '/data/kb.db'
  PORT = '8080'
  # Real customer docs (scanned contracts, deal packages) run 10-25MB. 30MB
  # cap fits them while still bounding in-request ingestion on a 1GB machine.
  MAX_UPLOAD_BYTES = '31457280'

[[mounts]]
  source = 'flv_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  # Always-on: the live inbox watcher holds a persistent IMAP IDLE connection to
  # Gmail (ADR-011), which a sleeping machine can't maintain. Revert to
  # auto_stop='stop' / min=0 if the watcher is disabled (WATCH_INBOX=0).
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  # 2GB: OCR rasterizes PDF pages in memory; 1GB OOM-killed on a 12MB scan.
  memory = '2gb'
